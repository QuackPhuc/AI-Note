name: ai_note
description: A note-taking app with AI summarization capabilities
version: 1.0.0+1
publish_to: 'none'

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.6
  sqflite: ^2.3.0
  path: ^1.8.3
  path_provider: ^2.1.1
  http: ^1.1.0
  provider: ^6.0.5
  intl: ^0.18.1
  flutter_markdown: ^0.6.17
  shared_preferences: ^2.2.2
  uuid: ^4.2.1
  # Thêm package Google Generative AI
  google_generative_ai: ^0.2.2

  # Thêm package path_provider_windows nếu cần
  path_provider_windows: ^2.2.1
  # Thêm package sqflite_common_ffi cho Windows
  sqflite_common_ffi: ^2.3.0+2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true
